<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Contact Form</title>
</head>
<body>
    <div class="messageSent" role="status">
        <h3><img src="images/icon-success-check.svg" alt="">Message Sent!</h3>
        <span class="messageSSpan">Thanks for completing the form. We'll be in touch soon!</span>
    </div>
    <article id="mainArtc">
        <h1>Contact Us</h1>

        <form>
                <div class="containerSect FNSect">
                    <label for="inpFN">First Name <span>*</span></label>
                    <input type="text" name="inpFN" id="inpFN" aria-describedby="fnError" required>
                    <p id="fnError" aria-live="polite"></p>
                </div>

                <div class="containerSect SNSect">
                    <label for="inpSN">Last Name <span>*</span></label> 
                    <input type="text" name="inpSN" id="inpSN" aria-describedby="snError" required>
                    <p id="snError" aria-live="polite"></p>
                </div>

           
                <div class="containerSect emailSect">
                    <label for="inpEmail">Email Address <span>*</span></label>
                    <input type="email" name="inpEmail" id="inpEmail" aria-describedby="emError" required>
                    <p id="emError" aria-live="polite"></p>
                </div>
           
            
                <fieldset>
                <legend>Query Type <span>*</span></legend>

                <div id="radioContainer">
                    <label class="radioOpt generalE"><input type="radio" name="optionQ" id="generalE" aria-describedby="radError" required> General Enquiry</label>
                    <label class="radioOpt supportR"><input type="radio" name="optionQ" id="supportR" aria-describedby="radError" required> Support Request</label>
                </div>
                <p id="radError" aria-live="polite"></p>
                </fieldset>
                
                <div class="containerSect messageA">
                    <label for="messageA">Message <span>*</span></label>
                    <textarea name="messageA" id="messageA" aria-describedby="meError" required></textarea>
                    <p id="meError" aria-live="polite"></p>  
                </div>
            
            
                <div class="containerSect consentBox">
                    <input type="checkbox" name="consentBox" id="consentBox" aria-describedby="boxError" required>
                    <label for="consentBox" id="labelConsent">I consent to being contacted by the team<span>*</span></label>
                    <p id="boxError" aria-live="polite"></p>
                </div>
                
            <button id="buttonS" type="submit">Submit</button>
        </form>
    </article>
    <script src="js/script.js"></script>
</body>
</html>
